name: Vercel E2E Smoke Tests

on:
  workflow_call:
    secrets:
      VERCEL_AUTOMATION_BYPASS_SECRET:
        required: false
      CROSSOVER_APP_ID:
        required: false
      CROSSOVER_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  smoke:
    name: Preview Smoke Tests
    if: github.event.client_payload.target != 'production'
    runs-on: ubuntu-latest
    steps:
      # Mint a Crossover App token so the PR comment below is posted as the org
      # App, falling back to GITHUB_TOKEN with a warning when the App secrets are
      # absent. See .github/actions/crossover-app-token.
      - name: Crossover App token
        id: token
        uses: Crossover-Research/.github/.github/actions/crossover-app-token@main
        with:
          app-id: ${{ secrets.CROSSOVER_APP_ID }}
          private-key: ${{ secrets.CROSSOVER_APP_PRIVATE_KEY }}
          github-token: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.git.sha }}

      - name: Run smoke tests
        env:
          DEPLOY_URL: ${{ github.event.client_payload.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Testing: $DEPLOY_URL"

          PASS=0; FAIL=0
          # check <route> [expected]
          # Without an expected code, any 2xx or 3xx is a pass so intentional
          # redirects (e.g. a root that 307s) don't fail the smoke test, while
          # 4xx/5xx/000 still fail. Pass an explicit code to assert it exactly.
          check() {
            local route=$1 expected=${2:-}
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              ${BYPASS_SECRET:+-H "x-vercel-protection-bypass: $BYPASS_SECRET"} \
              "$DEPLOY_URL$route" 2>/dev/null || echo "000")
            local ok=0
            if [ -n "$expected" ]; then
              [ "$status" = "$expected" ] && ok=1
            else
              case "$status" in 2??|3??) ok=1 ;; esac
            fi
            if [ "$ok" = "1" ]; then
              echo "PASS $status $route"; PASS=$((PASS+1))
            else
              echo "FAIL $status $route (expected ${expected:-2xx/3xx})"; FAIL=$((FAIL+1))
            fi
          }

          check "/"
          check "/api/health"

          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" = "0" ] || exit 1

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        env:
          DEPLOY_URL: ${{ github.event.client_payload.url }}
          COMMIT_SHA: ${{ github.event.client_payload.git.sha }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const url = process.env.DEPLOY_URL;
            const sha = process.env.COMMIT_SHA;
            if (!sha) { console.log('No SHA — skipping PR comment'); return; }
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner, repo: context.repo.repo, commit_sha: sha
            });
            const icon = '${{ job.status }}' === 'success' ? 'PASS' : 'FAIL';
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number,
                body: `${icon} **Preview smoke tests ${{ job.status }}**\n\n${url}`
              });
            }
