name: Claude Code Auto-Fix

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      CROSSOVER_APP_ID:
        required: false
      CROSSOVER_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    name: Diagnose & Fix CI Failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      # Mint a Crossover App token so the commit/push below is authored by the
      # org App (and can trigger downstream CI), falling back to GITHUB_TOKEN
      # with a warning when the App secrets are absent. See
      # .github/actions/crossover-app-token.
      - name: Crossover App token
        id: token
        uses: Crossover-Research/.github/.github/actions/crossover-app-token@main
        with:
          app-id: ${{ secrets.CROSSOVER_APP_ID }}
          private-key: ${{ secrets.CROSSOVER_APP_PRIVATE_KEY }}
          github-token: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Download failure logs
        uses: actions/github-script@v7
        id: logs
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const run = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const failedJobs = run.data.jobs.filter(j => j.conclusion === 'failure');
            let logs = '';
            for (const job of failedJobs) {
              const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id,
              });
              logs += `\n--- ${job.name} ---\n${log.data}\n`;
            }
            const fs = require('fs');
            fs.writeFileSync('failure-logs.txt', logs.slice(0, 50000));

      - name: Claude Code fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          prompt: |
            CI failed on this branch. The failure logs are in failure-logs.txt.

            1. Read the failure logs
            2. Identify the root cause
            3. Make the minimal fix needed
            4. Verify the fix by running the relevant check locally
            5. Commit the fix with a conventional commit message (fix: ...)

            Do NOT:
            - Suppress errors with @ts-ignore or type: any
            - Delete failing tests
            - Make changes unrelated to the failure

          max_turns: 5
          timeout_minutes: 10
