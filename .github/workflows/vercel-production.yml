name: Vercel Production Deploy

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '22'
      package-manager:
        required: false
        type: string
        default: 'pnpm'
      production-branch:
        required: false
        type: string
        default: 'main'
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_AUTOMATION_BYPASS_SECRET:
        required: false

# VERCEL_PROJECT_ID is read from .vercel/project.json at runtime (step below)
# VERCEL_ORG_ID must be set as env for CLI to pick up the team

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
      - name: Type check
        run: |
          if [ -f tsconfig.build.json ]; then
            npx tsc --noEmit --project tsconfig.build.json
          elif [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi
        continue-on-error: false

  deploy:
    name: Build → Deploy → Smoke
    needs: typecheck
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Export VERCEL_PROJECT_ID from .vercel/project.json
        run: |
          PROJECT_ID=$(python3 -c "import json; print(json.load(open('.vercel/project.json'))['projectId'])")
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "Loaded VERCEL_PROJECT_ID from .vercel/project.json"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy prebuilt to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Run the deploy with `set +e` so a nonzero exit from the Vercel CLI
          # does not abort the step under `bash -e` before we get a chance to
          # surface the captured output. Previously the failure produced an
          # opaque red check because $OUTPUT was never printed.
          set +e
          OUTPUT=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1)
          CODE=$?
          set -e

          # Redact the token from anything we print, in case the CLI echoes it.
          SANITIZED=$(printf '%s\n' "$OUTPUT" | sed "s/${VERCEL_TOKEN}/***/g")
          echo "$SANITIZED"

          # A Vercel deployment URL appears on its own line. Match anywhere on
          # the line (not just at the start) so trailing CLI annotations or
          # leading whitespace don't hide it, and take the last one.
          URL=$(printf '%s\n' "$OUTPUT" | grep -oE 'https://[A-Za-z0-9._-]+\.vercel\.app[^[:space:]]*' | tail -1)
          if [ -n "$URL" ]; then
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CODE" -eq 0 ]; then
            echo "Deployed: ${URL:-<no URL parsed>}"
            exit 0
          fi

          # Nonzero exit. Vercel sometimes reports a no-op when the prebuilt
          # artifact for this commit is already deployed; treat that as success
          # only when it also handed us a deployment URL. Anything else is a
          # real failure that must stay red.
          if printf '%s\n' "$SANITIZED" | grep -qiE 'already (built|deployed)|no[- ]?op|nothing to deploy|deployment .* already exists' \
             && [ -n "$URL" ]; then
            echo "::warning::Vercel reported an already-deployed/no-op state for this commit; using existing deployment URL $URL"
            echo "Deployed: $URL"
            exit 0
          fi

          echo "::error::vercel deploy failed (exit $CODE). See sanitized output above."
          exit "$CODE"

      - name: Smoke test
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        if: env.BYPASS_SECRET != ''
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          [ -z "$URL" ] && { echo "No deployment URL captured - skipping smoke"; exit 0; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20             -H "x-vercel-protection-bypass: $BYPASS_SECRET"             "$URL/api/health" 2>/dev/null || echo "000")
          echo "Health check: HTTP $STATUS at $URL"
          [ "$STATUS" = "200" ] && echo "Smoke test passed" || echo "No health endpoint (static site or 401-gated) - continuing"
