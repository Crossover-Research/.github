name: Bootstrap repos with standard CI

# Runs on two triggers:
#   1. workflow_dispatch — manual or called from an org webhook relay
#      Pass `repo` input to seed a single specific repo (e.g. on creation).
#   2. schedule — nightly audit that finds any org repo missing ci.yml and seeds it.
#      This is the safety net: even if the webhook relay misses a repo creation,
#      the nightly run catches it within 24 hours.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repo to bootstrap (owner/repo). Leave empty to audit all repos.'
        required: false
        default: ''
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly

permissions:
  contents: read   # elevated per-repo access comes from the App token below

jobs:
  bootstrap:
    name: Seed missing ci.yml
    runs-on: ubuntu-latest
    steps:
      # Mint the Crossover App token scoped to the whole org so we can push
      # to any repo under Crossover-Research.
      - name: Crossover App token (org-scoped)
        id: token
        uses: Crossover-Research/.github/.github/actions/crossover-app-token@main
        with:
          app-id: ${{ secrets.CROSSOVER_APP_ID }}
          private-key: ${{ secrets.CROSSOVER_APP_PRIVATE_KEY }}
          github-token: ${{ github.token }}
          owner: Crossover-Research

      - name: Checkout .github meta-repo (for examples/ci.yml source)
        uses: actions/checkout@v4
        with:
          path: meta

      - name: Discover and bootstrap repos
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          TARGET_REPO: ${{ inputs.repo }}
          ORG: Crossover-Research
        run: |
          set -euo pipefail

          WORKFLOW_FILE=".github/workflows/ci.yml"
          SOURCE_FILE="meta/examples/ci.yml"
          COMMIT_MSG="ci: bootstrap standard CI workflow (auto-seeded by repo-bootstrap)"

          seed_repo() {
            local FULL_NAME="$1"       # e.g. Crossover-Research/my-repo
            local REPO="${FULL_NAME#*/}"

            echo "--- Checking $FULL_NAME ---"

            # Skip the meta .github repo itself
            [ "$REPO" = ".github" ] && echo "Skipping meta-repo" && return

            # Check if ci.yml already exists
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$FULL_NAME/contents/$WORKFLOW_FILE")

            if [ "$HTTP" = "200" ]; then
              echo "  ✓ ci.yml already present — skipping"
              return
            fi

            echo "  ✗ ci.yml missing — seeding..."

            # Get the default branch
            DEFAULT_BRANCH=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$FULL_NAME" | python3 -c "import sys,json; print(json.load(sys.stdin)['default_branch'])")

            echo "  Default branch: $DEFAULT_BRANCH"

            CONTENT=$(base64 -w 0 < "$SOURCE_FILE")

            # Commit the file via GitHub Contents API
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$FULL_NAME/contents/$WORKFLOW_FILE" \
              -d "{\"message\":\"$COMMIT_MSG\",\"content\":\"$CONTENT\",\"branch\":\"$DEFAULT_BRANCH\"}")

            STATUS=$(echo "$RESPONSE" | tail -1)
            if [ "$STATUS" = "201" ]; then
              echo "  ✅ Seeded $FULL_NAME successfully"
            else
              echo "  ⚠️  Failed to seed $FULL_NAME (HTTP $STATUS):"
              echo "$RESPONSE" | head -n -1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','unknown error'))" 2>/dev/null || true
            fi
          }

          if [ -n "$TARGET_REPO" ]; then
            # Single-repo mode: called from webhook relay or manual dispatch
            seed_repo "$TARGET_REPO"
          else
            # Audit mode: iterate every non-archived repo in the org
            PAGE=1
            while true; do
              REPOS=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/orgs/$ORG/repos?per_page=100&page=$PAGE&sort=created&direction=desc" \
                | python3 -c "
import sys, json
repos = json.load(sys.stdin)
for r in repos:
    if not r.get('archived', False) and not r.get('disabled', False):
        print(r['full_name'])
")
              [ -z "$REPOS" ] && break
              while IFS= read -r repo; do
                seed_repo "$repo"
              done <<< "$REPOS"
              PAGE=$((PAGE + 1))
            done
          fi

          echo "Bootstrap run complete."
